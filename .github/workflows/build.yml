name: 🚀 Release

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 1

permissions:
  contents: write # Needed to upload artifacts to the release
  id-token: write # Needed for OIDC PyPI publishing

jobs:
  build:
    name: 🛠️ Build Wheel and SDist
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.baipp.outputs.package_name }}
      version: ${{ steps.baipp.outputs.package_version }}
    steps:
      - name: 🏗 Checkout Code
        uses: actions/checkout@v6
      - name: 🛠️ Build and Inspect Python Package
        uses: hynek/build-and-inspect-python-package@v2.17.0
        id: baipp

  publish:
    name: 🚀 Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: pypi
      url: https://pypi.org/p/${{ needs.build.outputs.name }}/${{ needs.build.outputs.version }}
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 📦 Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: Packages
          path: dist
      - name: 🚀 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
      - name: 📝 Attach Artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        # release-please creates the GH release when it tags. For manual tag
        # pushes (no release-please involvement), create the release here.
        # Either way, attach the built artifacts.
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
